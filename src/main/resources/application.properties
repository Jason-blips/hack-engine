spring.application.name=hack-engine

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/system?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server
server.port=8080
# Session cookie domain (optional): use "localhost" so cookie is sent when frontend on :3000 calls backend via proxy
server.servlet.session.cookie.domain=localhost

# CORS for frontend (web on port 3000)
app.cors.allowed-origins=http://localhost:3000

# Frontend URL (for OAuth redirect after login)
app.frontend.url=http://localhost:3000

# OAuth2 (optional): copy application-oauth.example.properties to application-oauth.properties
# and fill in client-id/client-secret, or set GOOGLE_CLIENT_ID/SECRET and FACEBOOK_APP_ID/SECRET.
# See README "Google / Facebook 登录配置".
