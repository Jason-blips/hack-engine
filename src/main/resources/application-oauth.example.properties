# OAuth2 - Copy to application-oauth.properties and fill in your credentials.
# Google: https://console.cloud.google.com/apis/credentials
# Facebook: https://developers.facebook.com/apps/
# Redirect URIs: http://localhost:8080/login/oauth2/code/google and .../code/facebook

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_APP_ID:your-facebook-app-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_APP_SECRET:your-facebook-app-secret}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
